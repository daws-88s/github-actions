name: Hello World Action
on: workflow_dispatch


jobs:
  # Job name
  say-hello:
    runs-on: ubuntu-latest # Github hosted runners
    steps:
      - name: Greet the world
        id: greet
        uses: daws-88s/github-actions/.github/actions/hello-world@main
        with:
          who-to-greet: 'Sivakumar'
      
      - run: echo random-number "$RANDOM_NUMBER"
        shell: bash
        env:
          RANDOM_NUMBER: ${{ steps.greet.outputs.random-number }}
